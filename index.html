<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Monitor de Ajuda - HOST</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        :root { --bg: #0b0f1a; --card: #161e2d; --accent: #3b82f6; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 40px; margin: 0; }
        .container { background: var(--card); padding: 30px; border-radius: 20px; width: 100%; max-width: 500px; border: 1px solid #1e293b; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #1e293b; padding-bottom: 15px; margin-bottom: 20px; }
        .badge { background: #064e3b; color: #34d399; padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; }
        #lista { display: flex; flex-direction: column; gap: 15px; }
        .msg-box { 
            background: #1e293b; padding: 20px; border-radius: 12px; border-left: 6px solid var(--accent);
            animation: alert-pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .msg-box small { color: #94a3b8; font-size: 0.7rem; display: block; margin-bottom: 5px; }
        .msg-box p { margin: 0; font-size: 1.1rem; line-height: 1.4; }
        @keyframes alert-pop { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0; font-size: 1.3rem;">📡 Central de Alertas</h2>
        <span class="badge" id="status">CONECTANDO...</span>
    </div>
    <div id="lista">
        <p style="text-align:center; color:#475569;" id="placeholder">Nenhum chamado pendente.</p>
    </div>
</div>

<audio id="audioAlerta" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

<script>
    // ID FIXO PARA O SEU CHEFE CONECTAR
    const peer = new Peer('chamado-urgente-p2p'); 

    peer.on('open', () => {
        document.getElementById('status').innerText = "ONLINE";
        console.log("Monitor pronto no ID: chamado-urgente-p2p");
    });

    peer.on('connection', (conn) => {
        conn.on('data', (data) => {
            // 1. Tocar o Som
            const som = document.getElementById('audioAlerta');
            som.currentTime = 0;
            som.play();

            // 2. Remover o texto de "vazio"
            const placeholder = document.getElementById('placeholder');
            if(placeholder) placeholder.remove();

            // 3. Criar o balão da mensagem
            const lista = document.getElementById('lista');
            const div = document.createElement('div');
            div.className = 'msg-box';
            const hora = new Date().toLocaleTimeString();
            div.innerHTML = `<small>${hora} - MENSAGEM RECEBIDA:</small><p>${data}</p>`;
            lista.prepend(div);

            // 4. Notificação de Desktop (opcional)
            if (Notification.permission === "granted") {
                new Notification("🚨 ALERTA DE AJUDA", { body: data });
            }
        });
    });

    if (Notification.permission !== "granted") Notification.requestPermission();
</script>
</body>
</html>
